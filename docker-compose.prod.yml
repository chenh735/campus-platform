services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_platform}
      MYSQL_USER: ${MYSQL_USER:-campus_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: campus-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: campus-backend
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: "mysql://${MYSQL_USER:-campus_user}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}@127.0.0.1:${MYSQL_HOST_PORT:-3307}/${MYSQL_DATABASE:-campus_platform}?charset=utf8mb4"
      REDIS_URL: redis://127.0.0.1:${REDIS_HOST_PORT:-6380}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-mail2.sysu.edu.cn}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS in .env}
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: campus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mysql-data:
  redis-data:
  uploads:
